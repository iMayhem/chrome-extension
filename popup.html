<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>RDP Bridge Settings</title>
  <link rel="stylesheet" href="assets/main.css">
</head>

<body>
  <div class="container">
    <h2>RDP Bridge Presence</h2>
    <p>Displays your active tab in your RDP Discord.</p>

    <label for="rdpAddress">RDP Server Address</label>
    <input type="text" id="rdpAddress" placeholder="e.g. 192.168.1.50 or myserver.com" autocomplete="off"
      spellcheck="false">

    <label for="rdpPort">Port</label>
    <input type="text" id="rdpPort" placeholder="e.g. 8081" autocomplete="off" spellcheck="false" value="8081">
    <p class="help-text">Make sure this port is open on your RDP firewall.</p>

    <div class="toggle-container">
      <label class="switch">
        <input type="checkbox" id="enablePresence">
        <span class="slider round"></span>
      </label>
      <span>Enable Bridge</span>
    </div>

    <hr>
    <h3>Advanced Settings</h3>

    <label for="customPrefix">Custom Status Prefix</label>
    <input type="text" id="customPrefix" placeholder="e.g. Researching:" autocomplete="off" spellcheck="false">
    <p class="help-text">Prepended to the tab title (e.g. "Researching: Wikipedia")</p>

    <label for="blacklist">Domain Filter List</label>
    <textarea id="blacklist" placeholder="bank.com&#10;paypal.com" rows="3" spellcheck="false"></textarea>

    <div style="margin-top: 5px;">
      <label>
        <input type="radio" name="listMode" value="blacklist" checked>
        Blacklist (Hide these sites)
      </label>
      <br>
      <label>
        <input type="radio" name="listMode" value="whitelist">
        Whitelist (ONLY show these sites)
      </label>
    </div>
    <p class="help-text">One domain per line.</p>

    <button id="saveBtn">Save & Apply</button>
    <div id="status"></div>
  </div>
  <script src="scripts/popup.js"></script>
</body>

</html>
